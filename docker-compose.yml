services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: HajainaDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  django:
    build: ../admin
    volumes:
      - ../admin:/app
      -  ../admin/media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/HajainaDB
  api:
    build: .
    volumes:
      - .:/app
      - /app/node_modules
      - ../admin/media:/app/media
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data: